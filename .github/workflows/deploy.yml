name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: deploy-licensing-worker

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

      - name: Deploy worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Runtime secrets are synced from GitHub secrets when present, so adding
      # or rotating them is a GitHub-secret change + re-run, never a local step.
      - name: Sync worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PADDLE_WEBHOOK_SECRET: ${{ secrets.PADDLE_WEBHOOK_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          if [ -n "$PADDLE_WEBHOOK_SECRET" ]; then
            printf '%s' "$PADDLE_WEBHOOK_SECRET" | npx wrangler secret put PADDLE_WEBHOOK_SECRET
          else
            echo "PADDLE_WEBHOOK_SECRET not set in GitHub secrets - skipping"
          fi
          if [ -n "$RESEND_API_KEY" ]; then
            printf '%s' "$RESEND_API_KEY" | npx wrangler secret put RESEND_API_KEY
          else
            echo "RESEND_API_KEY not set in GitHub secrets - skipping"
          fi
